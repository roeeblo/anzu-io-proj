name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test -- --testPathIgnorePatterns=tests/db

      - name: Build Docker image
        run: docker build -t socketrunner-server ./server

      - name: Docker smoke test
        run: |
          docker run -d -p 8080:8080 -e CI=true --name socketrunner-smoke socketrunner-server
          ok=0
          for i in $(seq 1 30); do
            if curl -fsS -o /dev/null http://127.0.0.1:8080/; then ok=1; break; fi
            sleep 1
          done
          if [ "$ok" != "1" ]; then echo "--- socketrunner-smoke logs ---"; docker logs socketrunner-smoke; exit 1; fi
          docker stop socketrunner-smoke
          docker rm socketrunner-smoke
