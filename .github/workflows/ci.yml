name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test -- --testPathIgnorePatterns=tests/db

      - name: Build Docker image
        run: docker build -t anzu-server ./server

      - name: Docker smoke test
        run: |
          docker run -d -p 8080:8080 -e CI=true --name anzu-smoke anzu-server
          sleep 5
          curl -f -s -o /dev/null http://localhost:8080 || (docker logs anzu-smoke; exit 1)
          docker stop anzu-smoke
          docker rm anzu-smoke
